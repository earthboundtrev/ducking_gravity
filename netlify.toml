[build]
  command = "node inject-env.js"
  publish = "."

# Netlify automatically uses 404.html for 404 errors
# This catch-all is for SPA routing - it only applies if no file matches
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  EMAILJS_PUBLIC_KEY = ""
  EMAILJS_SERVICE_ID = ""
  EMAILJS_TEMPLATE_ID = ""